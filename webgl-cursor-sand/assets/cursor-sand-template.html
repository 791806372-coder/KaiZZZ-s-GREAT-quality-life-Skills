<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebGL Cursor Sand Template</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6f2;
        --ink: #111;
        --ease: cubic-bezier(0.2, 0.72, 0.18, 1);
        font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        isolation: isolate;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--ink);
      }

      .cursor-sand {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0;
        mix-blend-mode: multiply;
        transition: opacity 0.28s var(--ease);
      }

      @media (hover: hover) and (pointer: fine) {
        body.cursor-ready .cursor-sand {
          opacity: 0.26;
        }

        a[href]:hover,
        button:hover {
          box-shadow: 0 20px 54px rgba(111, 96, 72, 0.12), 0 8px 22px rgba(196, 168, 121, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.62);
        }
      }

      @media (max-width: 620px) {
        .cursor-sand {
          display: none;
        }
      }

      main {
        position: relative;
        z-index: 1;
        width: min(860px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(52px, 9vw, 118px);
        line-height: 0.94;
      }

      p {
        max-width: 680px;
        margin: 0 0 28px;
        color: #333;
        font-size: 20px;
        line-height: 1.65;
      }

      a,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 18px;
        border: 1px solid rgba(17, 17, 17, 0.13);
        border-radius: 999px;
        background: #fff;
        color: inherit;
        font: inherit;
        font-weight: 760;
        text-decoration: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas class="cursor-sand" id="cursorSand" aria-hidden="true"></canvas>
    <main>
      <h1>HELLO,<br />CURSOR SAND</h1>
      <p>Move the pointer across this page. The WebGL canvas paints a subtle sand and ink wake behind the cursor on fine-pointer devices.</p>
      <a href="#demo">Hover target</a>
      <button type="button">Button target</button>
    </main>
    <script>
      const cursorSand = document.getElementById("cursorSand");
      const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function startCursorSand() {
        const finePointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
        if (!finePointer || prefersReduced || !cursorSand) return;

        const gl = cursorSand.getContext("webgl", {
          alpha: true,
          depth: false,
          stencil: false,
          antialias: true,
          preserveDrawingBuffer: false
        });
        if (!gl) return;

        const maxSplats = 42;
        const splats = [];
        let last = null;

        const vertexSource = `
          attribute vec2 aPosition;
          varying vec2 vUv;
          void main() {
            vUv = aPosition * 0.5 + 0.5;
            gl_Position = vec4(aPosition, 0.0, 1.0);
          }
        `;

        const fragmentSource = `
          precision mediump float;
          const int MAX_SPLATS = 42;
          varying vec2 vUv;
          uniform int uCount;
          uniform vec3 uSplats[MAX_SPLATS];
          uniform vec2 uVelocity[MAX_SPLATS];
          uniform float uAspect;
          void main() {
            float ink = 0.0;
            float grain = fract(sin(dot(vUv * 940.0, vec2(12.9898, 78.233))) * 43758.5453);
            for (int i = 0; i < MAX_SPLATS; i++) {
              if (i >= uCount) break;
              vec2 p = vUv - uSplats[i].xy;
              p.x *= uAspect;
              p -= uVelocity[i] * 0.038;
              float radius = uSplats[i].z;
              float core = exp(-dot(p, p) / radius);
              float dust = smoothstep(0.62, 0.0, length(p) / sqrt(radius)) * (0.72 + grain * 0.28);
              ink += core * 0.62 + dust * 0.12;
            }
            float alpha = clamp(ink, 0.0, 0.22);
            vec3 color = vec3(0.052, 0.046, 0.036);
            gl_FragColor = vec4(color, alpha);
          }
        `;

        function shader(type, source) {
          const item = gl.createShader(type);
          gl.shaderSource(item, source);
          gl.compileShader(item);
          if (!gl.getShaderParameter(item, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(item));
          return item;
        }

        const program = gl.createProgram();
        gl.attachShader(program, shader(gl.VERTEX_SHADER, vertexSource));
        gl.attachShader(program, shader(gl.FRAGMENT_SHADER, fragmentSource));
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(program));

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, -1, 1, 1, -1, 1, 1]), gl.STATIC_DRAW);

        const locations = {
          position: gl.getAttribLocation(program, "aPosition"),
          count: gl.getUniformLocation(program, "uCount"),
          splats: gl.getUniformLocation(program, "uSplats"),
          velocity: gl.getUniformLocation(program, "uVelocity"),
          aspect: gl.getUniformLocation(program, "uAspect")
        };

        function resize() {
          const ratio = Math.min(2, window.devicePixelRatio || 1);
          const width = Math.max(1, Math.floor(cursorSand.clientWidth * ratio));
          const height = Math.max(1, Math.floor(cursorSand.clientHeight * ratio));
          if (cursorSand.width !== width || cursorSand.height !== height) {
            cursorSand.width = width;
            cursorSand.height = height;
            gl.viewport(0, 0, width, height);
          }
        }

        function addSplat(event) {
          const rect = cursorSand.getBoundingClientRect();
          const x = (event.clientX - rect.left) / rect.width;
          const y = 1 - (event.clientY - rect.top) / rect.height;
          const now = performance.now();
          const active = event.target instanceof Element && event.target.closest("a[href], button, .h-node, .sim-btn");
          document.body.classList.toggle("cursor-hover", Boolean(active));

          let speed = 0;
          let vx = 0;
          let vy = 0;
          if (last) {
            const dt = Math.max(16, now - last.time);
            vx = x - last.x;
            vy = y - last.y;
            speed = Math.hypot(vx * rect.width, vy * rect.height) / dt;
          }
          last = { x, y, time: now };
          splats.unshift({
            x,
            y,
            vx,
            vy,
            life: active ? 1.12 : 1,
            radius: 0.0018 + Math.min(speed, 3.5) * 0.0032
          });
          splats.length = Math.min(splats.length, maxSplats);
        }

        function render() {
          resize();
          gl.clearColor(0, 0, 0, 0);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.useProgram(program);
          gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
          gl.enableVertexAttribArray(locations.position);
          gl.vertexAttribPointer(locations.position, 2, gl.FLOAT, false, 0, 0);

          const points = new Float32Array(maxSplats * 3);
          const velocities = new Float32Array(maxSplats * 2);
          for (let i = splats.length - 1; i >= 0; i -= 1) {
            const splat = splats[i];
            splat.life *= 0.955;
            splat.radius *= 1.012;
            if (splat.life < 0.018) splats.splice(i, 1);
          }
          splats.forEach((splat, index) => {
            points[index * 3] = splat.x;
            points[index * 3 + 1] = splat.y;
            points[index * 3 + 2] = splat.radius * splat.life;
            velocities[index * 2] = splat.vx;
            velocities[index * 2 + 1] = splat.vy;
          });

          gl.uniform1i(locations.count, splats.length);
          gl.uniform3fv(locations.splats, points);
          gl.uniform2fv(locations.velocity, velocities);
          gl.uniform1f(locations.aspect, gl.drawingBufferWidth / gl.drawingBufferHeight);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          requestAnimationFrame(render);
        }

        resize();
        document.body.classList.add("cursor-ready");
        window.addEventListener("pointermove", addSplat, { passive: true });
        requestAnimationFrame(render);
      }

      startCursorSand();
    </script>
  </body>
</html>
